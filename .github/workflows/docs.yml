name: Docs

# Builds rustdoc API documentation and deploys it to GitHub Pages on every
# push to main (which includes merged pull requests).

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system build deps (cpal → ALSA, plotters → fontconfig)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libfontconfig1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build API docs
        run: cargo doc --no-deps --all-features

      - name: Root redirect to crate docs
        run: echo '<meta http-equiv="refresh" content="0; url=treble/">' > target/doc/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
